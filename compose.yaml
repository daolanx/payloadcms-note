services:
  app:
    profiles: ["prod"]
    build: .
    image: ${DOCKER_REGISTRY:-payload-site-app}:${IMAGE_TAG:-latest}
    container_name: notes-app
    restart: unless-stopped
    env_file: .env.local
    environment:
      - NODE_ENV=production
      - PORT=3000
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  nginx:
    profiles: ["prod"]
    image: nginx:alpine
    container_name: notes-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/ssl:ro
    depends_on:
      app:
        condition: service_healthy

  dev:
    profiles: ["dev"]
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: notes-dev
    env_file: .env.local
    environment:
      - WATCHPACK_POLLING=true
      - HOSTNAME=0.0.0.0
    ports:
      - "3000:3000"
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - node_modules/
            - .next/
        - action: rebuild
          path: package.json
