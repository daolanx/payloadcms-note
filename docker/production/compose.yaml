services:
  app:
    image: ${APP_IMAGE}
    container_name: notes-app
    restart: always
    env_file: .env.local
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
