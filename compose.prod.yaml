services:
  app:
    profiles: ["prod"]
    image: crpi-l5xg3bxsmy58r36i.cn-hangzhou.personal.cr.aliyuncs.com/daolanx/payload-notes:latest
    container_name: notes-app
    restart: unless-stopped
    env_file: .env.local
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://218.244.153.47}
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  nginx:
    profiles: ["prod"]
    image: crpi-l5xg3bxsmy58r36i.cn-hangzhou.personal.cr.aliyuncs.com/daolanx/nginx:alpine
    container_name: notes-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/ssl:ro
    depends_on:
      app:
        condition: service_healthy
