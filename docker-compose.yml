services:
  web:
    build: .
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - sqlite-data:/app/data
      - media-data:/app/media
    environment:
      - NODE_ENV=production
      - DATABASE_URI=file:./data/database.db
      - PAYLOAD_SECRET=${PAYLOAD_SECRET:-change-me-in-production}
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./certs:/etc/nginx/certs
      - media-data:/media:ro
    depends_on:
      web:
        condition: service_healthy

  backup:
    image: alpine:3.19
    restart: unless-stopped
    entrypoint: /bin/sh
    command: ["-c", "echo '0 2 * * * /app/backup.sh >> /var/log/backup.log 2>&1' | crontab - && crond -f -L /dev/null"]
    volumes:
      - sqlite-data:/data:ro
      - media-data:/media:ro
      - ./scripts/backup.sh:/app/backup.sh:ro
    environment:
      - OSS_ENDPOINT=${OSS_ENDPOINT}
      - OSS_BUCKET=${OSS_BUCKET}
      - OSS_ACCESS_KEY_ID=${OSS_ACCESS_KEY_ID}
      - OSS_ACCESS_KEY_SECRET=${OSS_ACCESS_KEY_SECRET}
      - BACKUP_PREFIX=${BACKUP_PREFIX:-payload-site}
    depends_on:
      web:
        condition: service_healthy

volumes:
  sqlite-data:
  media-data:
