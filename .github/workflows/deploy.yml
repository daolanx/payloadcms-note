# CI/CD pipeline: push to main → build image → push to ACR → deploy to ECS
name: Deploy to ECS

on:
  push:
    branches: [main]

# ACR and deploy config from GitHub repo variables (non-sensitive)
env:
  ACR_REGISTRY: ${{ vars.ACR_REGISTRY }}
  ACR_NAMESPACE: ${{ vars.ACR_NAMESPACE }}
  ACR_USERNAME: ${{ vars.ACR_USERNAME }}
  IMAGE_NAME: ${{ vars.IMAGE_NAME }}
  DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract short SHA
        id: meta
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # Authenticate to Alibaba Cloud Container Registry
      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ env.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # Enable BuildKit for layer caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Cache pnpm store for faster dependency installation
      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      # Build image and push to ACR with short SHA + latest tags
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.SHORT_SHA }}
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Copy config files to ECS before deploying
      - name: Upload config to ECS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          source: "compose.yaml,nginx.conf"
          target: ${{ env.DEPLOY_PATH }}

      # SSH into ECS, update image tag, pull and restart containers
      - name: Deploy to ECS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            set -e

            # Use VPC endpoint on ECS (faster, no public bandwidth)
            ACR_VPC=$(echo "${{ env.ACR_REGISTRY }}" | sed 's/\.cn-hangzhou\./-vpc.cn-hangzhou./')

            docker login $ACR_VPC \
              -u ${{ env.ACR_USERNAME }} \
              -p ${{ secrets.ACR_PASSWORD }}

            cd ${{ env.DEPLOY_PATH }}

            # Export image tag for docker compose
            export APP_IMAGE="$ACR_VPC/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.SHORT_SHA }}"

            docker compose pull
            docker compose up -d --remove-orphans

            # Clean up old images to free disk space
            docker image prune -f
