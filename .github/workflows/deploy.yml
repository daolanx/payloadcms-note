# CI/CD pipeline: push tag → build image → push to ACR → deploy to ECS
name: Deploy to ECS

on:
  push:
    tags: ['v*']

# Prevent concurrent deployments — cancel older in-progress runs
concurrency:
  group: deploy-production
  cancel-in-progress: true

# ACR and deploy config from GitHub repo variables (non-sensitive)
env:
  ACR_REGISTRY: ${{ vars.ACR_REGISTRY }}
  ACR_VPC_REGISTRY: ${{ vars.ACR_VPC_REGISTRY }}
  ACR_NAMESPACE: ${{ vars.ACR_NAMESPACE }}
  ACR_USERNAME: ${{ vars.ACR_USERNAME }}
  IMAGE_NAME: ${{ vars.IMAGE_NAME }}
  DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Validate all required secrets and variables are configured
      - name: Preflight check
        run: |
          MISSING=()

          # ACR config
          for var in ACR_PASSWORD ACR_REGISTRY ACR_VPC_REGISTRY ACR_NAMESPACE ACR_USERNAME IMAGE_NAME; do
            val="${!var}"
            [ -z "$val" ] && MISSING+=("  $var")
          done

          # ECS config
          for var in ECS_HOST ECS_SSH_KEY ECS_USERNAME DEPLOY_PATH; do
            val="${!var}"
            [ -z "$val" ] && MISSING+=("  $var")
          done

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing required secrets/variables:"
            printf '%s\n' "${MISSING[@]}"
            exit 1
          fi

          echo "All secrets and variables OK"
        env:
          # ACR
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          ACR_REGISTRY: ${{ vars.ACR_REGISTRY }}
          ACR_VPC_REGISTRY: ${{ vars.ACR_VPC_REGISTRY }}
          ACR_NAMESPACE: ${{ vars.ACR_NAMESPACE }}
          ACR_USERNAME: ${{ vars.ACR_USERNAME }}
          IMAGE_NAME: ${{ vars.IMAGE_NAME }}
          # ECS
          ECS_HOST: ${{ secrets.ECS_HOST }}
          ECS_SSH_KEY: ${{ secrets.ECS_SSH_KEY }}
          ECS_USERNAME: ${{ secrets.ECS_USERNAME }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}

      - name: Extract short SHA
        id: meta
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # Authenticate to Alibaba Cloud Container Registry
      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ env.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # Enable BuildKit for layer caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build image and push to ACR with short SHA + latest tags
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/production/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.SHORT_SHA }}
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Copy config + deploy script to ECS
      - name: Upload config to ECS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          source: "docker/production/,.env.local,scripts/deploy-ecs.sh"
          target: ${{ env.DEPLOY_PATH }}

      # SSH into ECS and run deploy script
      - name: Deploy to ECS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            export ACR_VPC_REGISTRY="${{ env.ACR_VPC_REGISTRY }}"
            export ACR_NAMESPACE="${{ env.ACR_NAMESPACE }}"
            export ACR_USERNAME="${{ env.ACR_USERNAME }}"
            export ACR_PASSWORD="${{ secrets.ACR_PASSWORD }}"
            export IMAGE_NAME="${{ env.IMAGE_NAME }}"
            export IMAGE_TAG="${{ steps.meta.outputs.SHORT_SHA }}"
            export DEPLOY_PATH="${{ env.DEPLOY_PATH }}"
            bash "${{ env.DEPLOY_PATH }}/scripts/deploy-ecs.sh"
