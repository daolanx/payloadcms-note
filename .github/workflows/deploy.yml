# CI/CD pipeline: push to main → build image → push to ACR → deploy to ECS
name: Deploy to ECS

on:
  push:
    branches: [main]

# ACR and deploy config from GitHub repo variables (non-sensitive)
env:
  ACR_REGISTRY: ${{ vars.ACR_REGISTRY }}
  ACR_NAMESPACE: ${{ vars.ACR_NAMESPACE }}
  ACR_USERNAME: ${{ vars.ACR_USERNAME }}
  IMAGE_NAME: ${{ vars.IMAGE_NAME }}
  DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Authenticate to Alibaba Cloud Container Registry
      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ env.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # Enable BuildKit for layer caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build image and push to ACR with two tags: commit SHA + latest
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # SSH into ECS, update image tag, pull and restart containers
      - name: Deploy to ECS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            docker login ${{ env.ACR_REGISTRY }} \
              -u ${{ env.ACR_USERNAME }} \
              -p ${{ secrets.ACR_PASSWORD }}

            cd ${{ env.DEPLOY_PATH }}
            IMAGE="${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
            sed -i "s|image:.*|image: $IMAGE|" compose.yaml

            docker compose --profile prod pull
            docker compose --profile prod up -d --remove-orphans
