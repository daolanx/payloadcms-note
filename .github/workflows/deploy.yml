# CI/CD pipeline: push tag → build image → push to ACR → deploy to ECS
name: Deploy to ECS

on:
  push:
    tags: ['v*']

# Prevent concurrent deployments — cancel older in-progress runs
concurrency:
  group: deploy-production
  cancel-in-progress: true

# ACR and deploy config from GitHub repo variables (non-sensitive)
env:
  ACR_REGISTRY: ${{ vars.ACR_REGISTRY }}
  ACR_VPC_REGISTRY: ${{ vars.ACR_VPC_REGISTRY }}
  ACR_NAMESPACE: ${{ vars.ACR_NAMESPACE }}
  ACR_USERNAME: ${{ vars.ACR_USERNAME }}
  IMAGE_NAME: ${{ vars.IMAGE_NAME }}
  DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Validate all required secrets and variables are configured
      - name: Preflight check
        run: |
          MISSING=()

          # ACR config
          for var in ACR_PASSWORD ACR_REGISTRY ACR_VPC_REGISTRY ACR_NAMESPACE ACR_USERNAME IMAGE_NAME; do
            val="${!var}"
            [ -z "$val" ] && MISSING+=("  $var")
          done

          # ECS config
          for var in ECS_HOST ECS_SSH_KEY ECS_USERNAME DEPLOY_PATH; do
            val="${!var}"
            [ -z "$val" ] && MISSING+=("  $var")
          done

          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing required secrets/variables:"
            printf '%s\n' "${MISSING[@]}"
            exit 1
          fi

          echo "All secrets and variables OK"
        env:
          # ACR
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          ACR_REGISTRY: ${{ vars.ACR_REGISTRY }}
          ACR_VPC_REGISTRY: ${{ vars.ACR_VPC_REGISTRY }}
          ACR_NAMESPACE: ${{ vars.ACR_NAMESPACE }}
          ACR_USERNAME: ${{ vars.ACR_USERNAME }}
          IMAGE_NAME: ${{ vars.IMAGE_NAME }}
          # ECS
          ECS_HOST: ${{ secrets.ECS_HOST }}
          ECS_SSH_KEY: ${{ secrets.ECS_SSH_KEY }}
          ECS_USERNAME: ${{ secrets.ECS_USERNAME }}
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}

      - name: Extract short SHA
        id: meta
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # Authenticate to Alibaba Cloud Container Registry
      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ env.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # Enable BuildKit for layer caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build image and push to ACR with short SHA + latest tags
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/production/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.SHORT_SHA }}
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Copy production directory and env file to ECS before deploying
      - name: Upload config to ECS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          source: "docker/production/,.env.local"
          target: ${{ env.DEPLOY_PATH }}

      # SSH into ECS, update image tag, pull and restart containers
      - name: Deploy to ECS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            set -euo pipefail

            ACR_VPC="${{ env.ACR_VPC_REGISTRY }}"

            echo "${{ secrets.ACR_PASSWORD }}" | docker login $ACR_VPC \
              -u ${{ env.ACR_USERNAME }} \
              --password-stdin

            cd ${{ env.DEPLOY_PATH }}/docker/production

            # Record current image for rollback (inspect directly, not via compose)
            PREV_IMAGE=$(docker inspect --format='{{.Config.Image}}' notes-app 2>/dev/null || echo "none")
            echo "Previous image: $PREV_IMAGE"

            export APP_IMAGE="$ACR_VPC/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.SHORT_SHA }}"
            echo "Deploying: $APP_IMAGE"

            # Pull first while old container is still running (minimize downtime)
            docker compose pull

            # Verify image exists locally before stopping old container
            docker image inspect "$APP_IMAGE" > /dev/null 2>&1 || {
              echo "::error::Image $APP_IMAGE not found locally after pull"
              exit 1
            }

            # Stop and remove old containers by name (compose down may not
            # find them if they belong to a different compose project)
            docker stop notes-app notes-nginx 2>/dev/null || true
            docker rm notes-app notes-nginx 2>/dev/null || true

            # Start new containers
            docker compose up -d --remove-orphans

            # Health check — use compose healthcheck status (not just Exit/Restarting)
            for i in $(seq 1 20); do
              # Check if app container is healthy (compose healthcheck passes)
              HEALTHY=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' notes-app 2>/dev/null || echo "missing")
              RUNNING=$(docker inspect --format='{{.State.Running}}' notes-app 2>/dev/null || echo "false")

              if [ "$HEALTHY" = "healthy" ] && [ "$RUNNING" = "true" ]; then
                echo "✓ App container healthy"
                break
              fi

              # If container exited or is missing, fail fast
              if [ "$HEALTHY" = "missing" ] || [ "$RUNNING" = "false" ]; then
                echo "::error::App container not running (health=$HEALTHY, running=$RUNNING)"
                docker compose logs --tail=50 app
                break
              fi

              if [ "$i" -eq 20 ]; then
                echo "::error::Health check timed out after 100s (health=$HEALTHY)"
                docker compose logs --tail=100
              fi

              echo "Waiting for app to become healthy... ($i/20, status=$HEALTHY)"
              sleep 5
            done

            # Final status check — if unhealthy, rollback
            FINAL_HEALTH=$(docker inspect --format='{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' notes-app 2>/dev/null || echo "missing")
            if [ "$FINAL_HEALTH" != "healthy" ]; then
              echo "::error::Deployment failed — rolling back to $PREV_IMAGE"
              if [ "$PREV_IMAGE" != "none" ]; then
                export APP_IMAGE="$PREV_IMAGE"
                docker stop notes-app notes-nginx 2>/dev/null || true
                docker rm notes-app notes-nginx 2>/dev/null || true
                docker compose up -d --remove-orphans
                echo "Rollback to $PREV_IMAGE completed"
              else
                echo "No previous image to rollback to"
              fi
              exit 1
            fi

            # Clean up old images (only recent 72h to avoid removing other projects' caches)
            docker image prune -f --filter "until=72h"

            echo "✓ Deployment successful"
