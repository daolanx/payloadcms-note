# CI/CD pipeline: push tag → build image → push to ACR → deploy to ECS
name: Deploy to ECS

on:
  push:
    tags: ['v*']

# Prevent concurrent deployments — cancel older in-progress runs
concurrency:
  group: deploy-production
  cancel-in-progress: true

# ACR and deploy config from GitHub repo variables (non-sensitive)
env:
  ACR_REGISTRY: ${{ vars.ACR_REGISTRY }}
  ACR_VPC_REGISTRY: ${{ vars.ACR_VPC_REGISTRY }}
  ACR_NAMESPACE: ${{ vars.ACR_NAMESPACE }}
  ACR_USERNAME: ${{ vars.ACR_USERNAME }}
  IMAGE_NAME: ${{ vars.IMAGE_NAME }}
  DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract short SHA
        id: meta
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      # Authenticate to Alibaba Cloud Container Registry
      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ env.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # Enable BuildKit for layer caching
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build image and push to ACR with short SHA + latest tags
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/production/Dockerfile
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.SHORT_SHA }}
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Copy config + scripts to ECS
      - name: Upload config to ECS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          source: ".env.local,scripts/server/"
          target: ${{ env.DEPLOY_PATH }}

      # Initialize ECS (install Docker, first-run only, idempotent)
      - name: Init ECS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: bash "${{ env.DEPLOY_PATH }}/scripts/server/init-ecs.sh"

      # Deploy app container
      - name: Deploy app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USERNAME }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            export ACR_VPC_REGISTRY="${{ env.ACR_VPC_REGISTRY }}"
            export ACR_NAMESPACE="${{ env.ACR_NAMESPACE }}"
            export ACR_USERNAME="${{ env.ACR_USERNAME }}"
            export ACR_PASSWORD="${{ secrets.ACR_PASSWORD }}"
            export IMAGE_NAME="${{ env.IMAGE_NAME }}"
            export IMAGE_TAG="${{ steps.meta.outputs.SHORT_SHA }}"
            export DEPLOY_PATH="${{ env.DEPLOY_PATH }}"
            bash "${{ env.DEPLOY_PATH }}/scripts/server/deploy-app.sh"
